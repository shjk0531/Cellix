services:
    postgres:
        container_name: cellix-postgres
        image: postgres:15-alpine
        restart: unless-stopped
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-cellix}
            POSTGRES_USER: ${POSTGRES_USER:-cellix}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cellix_secret}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-cellix} -d ${POSTGRES_DB:-cellix}",
                ]
            interval: 5s
            timeout: 5s
            retries: 10

    redis:
        container_name: cellix-redis
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "${REDIS_PORT:-6379}:6379"
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10

    migrate:
        container_name: cellix-migrate
        build:
            context: .
            dockerfile: packages/backend/Dockerfile
        command: pnpm --filter @cellix/backend db:migrate
        env_file:
            - .env
        environment:
            DATABASE_URL: "postgresql://${POSTGRES_USER:-cellix}:${POSTGRES_PASSWORD:-cellix_secret}@postgres:5432/${POSTGRES_DB:-cellix}"
        depends_on:
            postgres:
                condition: service_healthy
        restart: "no"

    backend:
        container_name: cellix-backend
        build:
            context: .
            dockerfile: packages/backend/Dockerfile
        ports:
            - "${BACKEND_PORT:-3001}:3001"
        volumes:
            - ./packages/backend/src:/app/packages/backend/src
            - ./packages/shared/src:/app/packages/shared/src
        env_file:
            - .env
        environment:
            NODE_ENV: development
            PORT: "3001"
            HOST: "0.0.0.0"
            DATABASE_URL: "postgresql://${POSTGRES_USER:-cellix}:${POSTGRES_PASSWORD:-cellix_secret}@postgres:5432/${POSTGRES_DB:-cellix}"
            REDIS_URL: "redis://redis:6379"
            CORS_ORIGIN: "http://localhost:5173"
            GRADING_SERVICE_URL: "http://grading-service:3003"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
            grading-service:
                condition: service_started

    auth-service:
        container_name: cellix-auth-service
        build:
            context: .
            dockerfile: packages/auth-service/Dockerfile
        ports:
            - "${AUTH_SERVICE_PORT:-3002}:3002"
        volumes:
            - ./packages/auth-service/src:/app/packages/auth-service/src
            - ./packages/shared/src:/app/packages/shared/src
        env_file:
            - .env
        environment:
            NODE_ENV: development
            PORT: "3002"
            HOST: "0.0.0.0"
            DATABASE_URL: "postgresql://${POSTGRES_USER:-cellix}:${POSTGRES_PASSWORD:-cellix_secret}@postgres:5432/${POSTGRES_DB:-cellix}"
            REDIS_URL: "redis://redis:6379"
            CORS_ORIGIN: "http://localhost:5173"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully

    grading-service:
        container_name: cellix-grading-service
        build:
            context: .
            dockerfile: packages/grading-service/Dockerfile
        ports:
            - "${GRADING_SERVICE_PORT:-3003}:3003"
        volumes:
            - ./packages/grading-service/src:/app/packages/grading-service/src
            - ./packages/shared/src:/app/packages/shared/src
            - ./packages/formula-engine/pkg-node:/app/packages/formula-engine/pkg-node
        env_file:
            - .env
        environment:
            NODE_ENV: development
            PORT: "3003"
            HOST: "0.0.0.0"
            CORS_ORIGIN: "http://localhost:5173"

    frontend:
        container_name: cellix-frontend
        build:
            context: .
            dockerfile: packages/frontend/Dockerfile
        ports:
            - "${FRONTEND_PORT:-5173}:5173"
        volumes:
            - ./packages/frontend/src:/app/packages/frontend/src
            - ./packages/frontend/vite.config.ts:/app/packages/frontend/vite.config.ts
            - ./packages/frontend/tsconfig.json:/app/packages/frontend/tsconfig.json
            - ./packages/shared/src:/app/packages/shared/src
        env_file:
            - .env
        environment:
            NODE_ENV: development
            VITE_API_BASE_URL: "http://localhost:${BACKEND_PORT:-3001}"
            VITE_AUTH_API_BASE_URL: "http://localhost:${AUTH_SERVICE_PORT:-3002}"
        depends_on:
            - backend
            - auth-service

volumes:
    postgres_data:
    redis_data:
